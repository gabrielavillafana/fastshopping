<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambev Connect</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2196f3">
  <link rel="icon" href="icons/icon-192.png">

  <style>
    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #e3f2fd 0%, #ffffff 100%);
      color: #222;
      margin: 0;
      padding: 0;
      text-align: center;
      overflow-y: scroll;
    }

    header {
      background: #2196f3;
      color: white;
      padding: 20px 10px;
      font-size: 1.6rem;
      font-weight: 600;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }

    main {
      max-width: 500px;
      margin: 30px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      padding: 25px;
    }

    input, select, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      background: #2196f3;
      border: none;
      color: #fff;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #1976d2;
    }

    #installBtn {
      display: none;
      background: #43a047;
    }

    #installBtn:hover {
      background: #2e7d32;
    }

    #timerBox {
      display: none;
      margin-top: 20px;
      color: #f57c00;
      font-weight: 600;
      font-size: 1.1rem;
    }

    footer {
      margin: 40px 0 20px;
      color: #888;
      font-size: 0.9rem;
    }

    .progress-bar {
      width: 0%;
      height: 6px;
      background: #2196f3;
      border-radius: 3px;
      margin-top: 10px;
      transition: width 1s linear;
    }
  </style>
</head>
<body>
  <header>Ambev Connect</header>

  <main>
    <h2>Let’s get to know you</h2>
    <p>Please complete the short form below. Once you’re done, you’ll be able to install Ambev Connect.</p>

    <form id="userForm">
      <input type="text" id="firstName" placeholder="First name" required>
      <input type="text" id="lastName" placeholder="Last name" required>
      <input type="email" id="email" placeholder="Email address" required>
      <input type="tel" id="phone" placeholder="Phone number" required>
      <select id="interest" required>
        <option value="">Select an interest</option>
        <option>Shopping</option>
        <option>Logistics</option>
        <option>Technology</option>
        <option>Business</option>
      </select>
      <textarea id="message" rows="3" placeholder="Tell us briefly why you love Ambev Connect"></textarea>

      <button type="submit">Continue</button>
    </form>

    <div id="timerBox">⏳ Preparing installation... please wait <span id="countdown">15</span>s</div>
    <div class="progress-bar" id="progressBar"></div>

    <button id="installBtn">📲 Install Ambev Connect</button>
  </main>

  <footer>© 2026 Ambev Connect | Progressive Web App</footer>

  <script>
    let deferredPrompt;
    let engagementReady = false;
    const form = document.getElementById('userForm');
    const timerBox = document.getElementById('timerBox');
    const countdown = document.getElementById('countdown');
    const progressBar = document.getElementById('progressBar');
    const installBtn = document.getElementById('installBtn');

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    // Capture install prompt event
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    // Simulate engagement with form + scroll + timer
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      form.style.display = 'none';
      timerBox.style.display = 'block';
      progressBar.style.display = 'block';

      let timeLeft = 15;
      const total = 15;
      const timer = setInterval(() => {
        timeLeft--;
        countdown.textContent = timeLeft;
        progressBar.style.width = ((total - timeLeft) / total * 100) + "%";
        if (timeLeft <= 0) {
          clearInterval(timer);
          timerBox.textContent = "✅ You're ready! Scroll to the bottom and click Install Ambev Connect.";
          installBtn.style.display = 'inline-block';
          engagementReady = true;
        }
      }, 1000);
    });

    // Detect scroll for additional engagement
    window.addEventListener('scroll', () => {
      if (engagementReady && deferredPrompt && installBtn.style.display === 'none') {
        installBtn.style.display = 'inline-block';
      }
    });

    // When user clicks Install
    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('User install choice:', outcome);
        deferredPrompt = null;
      } else {
        alert('If no install prompt appears, open your browser menu and choose "Install App".');
      }
    });
  </script>
</body>
</html>
