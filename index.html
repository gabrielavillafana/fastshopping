<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambev Connect</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2196f3">
  <link rel="icon" href="icons/icon-192.png">

  <style>
    body {
      font-family: system-ui, sans-serif;
      text-align: center;
      margin: 40px;
      background: #f5f8ff;
      color: #222;
    }
    #installBtn {
      margin-top: 25px;
      padding: 14px 22px;
      background: #2196f3;
      border: none;
      color: white;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
      transition: background 0.3s ease;
    }
    #installBtn:hover {
      background: #1976d2;
    }
    #instructions {
      display: none;
      margin-top: 20px;
      background: #fff3cd;
      border: 1px solid #ffeeba;
      padding: 15px;
      border-radius: 8px;
      font-size: 1rem;
      color: #856404;
    }
  </style>
</head>
<body>
  <h1>Welcome to Ambev Connect!</h1>
  <p>Tap below to install this app on your device.</p>

  <button id="installBtn">📲 Install Ambev Connect DOWNLOADER</button>

  <div id="instructions">
    <p><strong>To install manually:</strong><br>
    Tap <b>Share → Add to Home Screen</b> on your browser menu.</p>
  </div>

  <script>
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    const instructions = document.getElementById('instructions');

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    // Listen for the install prompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    // When user clicks install button
    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('User accepted the install prompt');
        } else {
          console.log('User dismissed the install prompt');
        }
        deferredPrompt = null;
      } else {
        // Show simple visual instructions if browser can't prompt automatically
        instructions.style.display = 'block';
        installBtn.style.display = 'none';
      }
    });
  </script>
</body>
</html>
