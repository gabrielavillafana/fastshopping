<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambev Connect</title>

  <!-- PWA meta -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2196f3">
  <link rel="icon" href="icons/icon-192.png">

  <style>
    body {
      font-family: system-ui, sans-serif;
      text-align: center;
      margin: 40px;
      background: #f5f8ff;
      color: #222;
    }
    #installBtn {
      margin-top: 25px;
      padding: 14px 22px;
      background: #2196f3;
      border: none;
      color: white;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
      transition: background 0.3s ease;
    }
    #installBtn:hover {
      background: #1976d2;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Welcome to Ambev Connect!</h1>
  <p>You can install this app directly on your device for quick access.THIS MUST WORK</p>

  <!-- The button is always visible -->
  <button id="installBtn">📲 Install Ambev Connect</button>

  <script>
    let deferredPrompt;

    // Register the service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    // Listen for the beforeinstallprompt event
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    // When user clicks the button
    const installBtn = document.getElementById('installBtn');
    installBtn.addEventListener('click', async () => {
      // If the browser already decided installability
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response to install: ${outcome}`);
        deferredPrompt = null;
      } else {
        alert('If no prompt appears, you can install manually from your browser menu.');
      }
    });
  </script>
</body>
</html>
